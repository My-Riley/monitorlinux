<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="renderer" content="webkit">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="icon" href="<%= BASE_URL %>favicon.ico">
  <title>
    <%= webpackConfig.name %>
  </title>
  <script src="<%= BASE_URL %>config.js?v=<%=new Date().getTime()%>"></script>
  <!-- 移除不存在的webrtcstreamer.js引用 -->
  <script src="<%= BASE_URL %>adapter.min.js?v=<%=new Date().getTime()%>"></script>
  <!--[if lt IE 11]><script>window.location.href='/html/ie.html';</script><![endif]-->
  <style>
    html,
    body,
    #app {
      height: 100%;
      margin: 0px;
      padding: 0px;
      background: #fff;
    }

    .chromeframe {
      margin: 0.2em 0;
      background: #ccc;
      color: #000;
      padding: 0.2em 0;
    }
  </style>
</head>

<body>
  <div id="app">
    <!-- <script src="./codebase/jquery-1.12.1.min.js"></script> -->
    <!-- <script src="./codebase/jquery-1.12.1.min.js"></script> -->
    <!-- <script src="../src/views/cellManagement/camera/webVideoCtrl.js"></script> -->
  </div>
</body>
<script>
  const viewportEl = document.querySelector('meta[name="viewport"]')
  var scale = 1 / window.devicePixelRatio,
    content = 'width=device-width, initial-scale=' + scale + ', minimum-scale=' + scale + ', maximum-scale=' + scale + ', user-scalable=no';
  if (viewportEl) {
    viewportEl.setAttribute('content', content);
  }
</script>

</html>
